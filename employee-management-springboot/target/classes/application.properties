server.port=5000

# ===========================
# ORACLE DATABASE
# ===========================
spring.datasource.url=jdbc:oracle:thin:@192.168.132.71:1521/orclpdb
spring.datasource.username=dfcudev
spring.datasource.password=dfcudev
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection Pool (HikariCP)
